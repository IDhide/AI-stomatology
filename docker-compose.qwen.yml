# ════════════════════════════════════════════════════════════════════
#  Smile.AI — НАДСТРОЙКА «клонированный голос» (Qwen3-TTS-VC, GPU)
#
#  Оливия говорит голосом из вашего образца (assets/voice/reference.wav).
#  Требуется GPU (NVIDIA) + nvidia-container-toolkit на хосте.
#
#  Перед запуском:
#    1. Положите образец голоса:   assets/voice/reference.wav  (10–15 с, чисто)
#    2. Положите расшифровку:       assets/voice/reference.txt  (точный текст образца)
#    3. Запуск (поверх smart-стенда):
#       docker compose -f docker-compose.demo.yml \
#                      -f docker-compose.smart.yml \
#                      -f docker-compose.qwen.yml up --build
#       # короче:  make qwen
#
#  Первый запуск скачает модель Qwen (~3–4 ГБ) в volume hf_cache.
# ════════════════════════════════════════════════════════════════════

services:

  # Освобождаем GPU под Qwen3-TTS-VC: Ollama работает на CPU.
  # 1.5B-модель отвечает за ~1.5–3 с на CPU — для киоска приемлемо,
  # зато весь GPU свободен под клонированный голос.
  ollama:
    environment:
      CUDA_VISIBLE_DEVICES: ""

  web:
    build:
      args:
        WITH_TTS: "1"
        TTS_ENGINE: "qwen3vc"
    environment:
      TTS_ENGINE: "qwen3vc"
      QWEN_REF_AUDIO: "${QWEN_REF_AUDIO:-/app/assets/voice/reference.wav}"
      QWEN_REF_TEXT_FILE: "${QWEN_REF_TEXT_FILE:-/app/assets/voice/reference.txt}"
      QWEN_TTS_MODEL: "${QWEN_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-Base}"
      QWEN_DEVICE: "${QWEN_DEVICE:-cuda:0}"
      QWEN_LANGUAGE: "${QWEN_LANGUAGE:-Russian}"
      QWEN_ATTN: "${QWEN_ATTN:-sdpa}"
      HF_HOME: "/root/.cache/huggingface"
    volumes:
      - hf_cache:/root/.cache/huggingface   # кэш весов Qwen (~3–4 ГБ)
    # GPU для контейнера web (нужен nvidia-container-toolkit на хосте)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
    driver: local
