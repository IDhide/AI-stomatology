<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Оливия · Стоматология №1</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- three.js локально: киоск не должен зависеть от внешнего CDN -->
  <script type="importmap">
    { "imports": { "three": "/vendor/three.module.js" } }
  </script>
</head>
<body>
  <!-- Фон ожидания: своё видео (kiosk/assets/jellyfish.mp4), если есть -->
  <video id="idle-video" class="layer hidden" autoplay muted loop playsinline></video>
  <!-- Процедурные медузы на canvas — работают всегда, файл не нужен -->
  <canvas id="idle-canvas" class="layer"></canvas>

  <!-- Активный режим: WebGL-шар -->
  <canvas id="scene" class="layer hidden"></canvas>

  <!-- Служебный оверлей (субтитры + статус) -->
  <div id="overlay">
    <div id="caption"></div>
    <div id="status">режим ожидания</div>
  </div>

  <!-- Кнопка старта: нужна, чтобы браузер разрешил микрофон/звук -->
  <button id="start-btn">Запустить киоск</button>

  <!-- Панель отладки для теста на MacBook (скрыта в проде) -->
  <div id="debug">
    <button data-act="enter">👤 Вошёл</button>
    <button data-act="leave">🚪 Ушёл</button>
    <button data-act="talk">🎤 Говорить</button>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
