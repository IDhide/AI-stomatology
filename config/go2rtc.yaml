# ════════════════════════════════════════════════════════════════════
#  go2rtc — RTSP-мост для камер
#  Документация: https://github.com/AlexxIT/go2rtc
#
#  Xiaomi Smart Camera C200 (chuangmi.camera.046c04):
#    1. Откройте приложение Mi Home → камера → настройки
#    2. Запишите локальный IP камеры (напр. 192.168.1.100)
#    3. В «общие сведения» найдите Device ID (did)
#    4. Логин/пароль — ваш аккаунт Mi Home (Xiaomi)
#    5. Подставьте данные в URL ниже
#
#  После запуска go2rtc:
#    • Просмотр потока: http://localhost:1984
#    • RTSP-выход:      rtsp://localhost:8554/xiaomi_c200
# ════════════════════════════════════════════════════════════════════

streams:
  xiaomi_c200:
    - "xiaomi://LOGIN:PASSWORD@192.168.1.100?did=DEVICE_ID&model=chuangmi.camera.046c04"
