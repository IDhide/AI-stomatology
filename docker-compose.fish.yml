# ════════════════════════════════════════════════════════════════════
#  Smile.AI — НАДСТРОЙКА «живой голос Fish Speech / OpenAudio S1»
#
#  Оливия говорит голосом из вашего образца (assets/voice/reference.*),
#  но заметно живее и эмоциональнее, чем Silero. Fish Speech — полностью
#  open-source (Apache 2.0), крутится ЛОКАЛЬНО отдельным контейнером,
#  без облака и API-ключей. web обращается к нему по HTTP.
#
#  Качество — лучшее из доступного; за это платим ресурсами:
#    • Рекомендуется GPU (~4 ГБ VRAM) — тогда ответ ~1–2 с.
#    • На CPU тоже работает, но медленно (несколько секунд на реплику).
#      Для CPU: уберите блок deploy.resources ниже и поставьте
#      FISH_DEVICE=cpu (см. .env).
#
#  Образец голоса (как у Qwen/XTTS):
#    1. assets/voice/reference.mp3 (или .wav) — 10–15 с чистой речи
#    2. assets/voice/reference.txt — точная расшифровка образца
#
#  Запуск:
#    make fish            (или вручную:)
#    docker compose -f docker-compose.demo.yml -f docker-compose.smart.yml \
#                   -f docker-compose.fish.yml up --build
#
#  Первый старт качает веса OpenAudio S1-mini (~1 ГБ) в том fish_models —
#  это разово, дальше берётся из кэша.
# ════════════════════════════════════════════════════════════════════

services:

  # ── Сервер Fish Speech (синтез голоса) ───────────────────────────
  fish-speech:
    image: fishaudio/fish-speech:latest
    container_name: smile-fish
    environment:
      HF_HOME: "/opt/fish-speech/checkpoints/hf"
    # Качаем веса при первом старте, затем поднимаем HTTP-сервер синтеза.
    # $$ экранирует переменные оболочки от подстановки docker compose.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        CKPT=/opt/fish-speech/checkpoints/openaudio-s1-mini
        if [ ! -f "$$CKPT/codec.pth" ]; then
          echo "Fish Speech: качаю веса OpenAudio S1-mini (~1 ГБ, разово)…"
          python3 -c "from huggingface_hub import snapshot_download; snapshot_download('fishaudio/openaudio-s1-mini', local_dir='$$CKPT')"
        fi
        echo "Fish Speech: запускаю сервер синтеза на 0.0.0.0:8080…"
        exec python3 -m tools.api_server \
          --listen 0.0.0.0:8080 \
          --llama-checkpoint-path "$$CKPT" \
          --decoder-checkpoint-path "$$CKPT/codec.pth" \
          --decoder-config-name modded_dac_vq
    volumes:
      - fish_models:/opt/fish-speech/checkpoints   # кэш весов модели
    ports:
      - "8081:8080"   # наружу, чтобы можно было дёрнуть сервер напрямую
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/v1/health',timeout=5).status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 600s   # первый старт = скачивание весов + загрузка модели
    restart: unless-stopped
    # GPU для контейнера. На CPU — уберите этот блок и поставьте FISH_DEVICE=cpu.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Веб-киоск: голос через сервер Fish Speech ────────────────────
  web:
    build:
      args:
        WITH_TTS: "1"
        # ставим в образ Silero — локальный фолбэк на время прогрева Fish
        TTS_ENGINE: "fishaudio"
    environment:
      TTS_ENGINE: "fishaudio"
      FISH_API_URL: "http://fish-speech:8080"
      # Образец голоса для клонирования (отправляется на сервер по HTTP)
      FISH_REF_AUDIO: "${FISH_REF_AUDIO:-/app/assets/voice/reference.mp3}"
      FISH_REF_TEXT_FILE: "${FISH_REF_TEXT_FILE:-/app/assets/voice/reference.txt}"
      # «Живость» голоса: больше temperature/top_p — выразительнее, но менее
      # стабильно; меньше — ровнее и предсказуемее.
      FISH_TEMPERATURE: "${FISH_TEMPERATURE:-0.7}"
      FISH_TOP_P: "${FISH_TOP_P:-0.7}"
      FISH_REP_PENALTY: "${FISH_REP_PENALTY:-1.2}"
      FISH_TIMEOUT: "${FISH_TIMEOUT:-60}"
    depends_on:
      fish-speech:
        condition: service_healthy

volumes:
  fish_models:
    driver: local
