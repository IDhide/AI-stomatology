# ════════════════════════════════════════════════════════════════════
#  Override для GPU (NVIDIA CUDA)
#  Использование:
#    docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# ════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  smile-ai:
    build:
      args:
        VARIANT: gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
