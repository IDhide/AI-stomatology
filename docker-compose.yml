# ════════════════════════════════════════════════════════════════════
#  Smile.AI — docker-compose
#
#  Сервисы:
#    ollama   — LLM-бэкенд (Ollama), порт 11434
#    smile-ai — основное приложение
#
#  Запуск:
#    docker compose up -d           # фоновый режим
#    docker compose logs -f         # логи
#    docker compose up smile-ai     # только приложение (Ollama уже запущен)
#
#  Production с GPU:
#    VARIANT=gpu docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# ════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Ollama (LLM) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: smile-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Smile.AI приложение ───────────────────────────────────────────
  smile-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VARIANT: cpu        # gpu для NVIDIA-хоста (см. docker-compose.gpu.yml)
    container_name: smile-ai
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env                # создайте из .env.example
    environment:
      OLLAMA_HOST: "http://ollama:11434"     # внутренняя сеть docker
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data                     # логи и БД — вне контейнера
      - ./assets:/app/assets                 # видео для UI
      - ./config:/app/config                 # конфиги можно менять без ребилда
    # Для UI с X11-форвардингом раскомментируйте:
    # environment:
    #   DISPLAY: $DISPLAY
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix
    # network_mode: host
    stdin_open: true
    tty: true

volumes:
  ollama_data:
    driver: local
