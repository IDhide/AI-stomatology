# ════════════════════════════════════════════════════════════════════
#  Smile.AI — CI (GitHub Actions)
# ════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, "setup/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libsndfile1 ffmpeg libgl1 libglib2.0-0

      - name: Create venv
        run: uv venv .venv

      - name: Install deps (без torch/opencv/mediapipe/pygame)
        run: |
          uv pip install --python .venv/bin/python \
            "loguru>=0.7.2" "pyyaml>=6.0.1" "pydantic>=2.5" \
            "python-dotenv>=1.0" "requests>=2.31" "aiohttp>=3.9" \
            "num2words>=0.5.13" "numpy>=1.26,<2.1" \
            "soundfile>=0.12.1" "omegaconf>=2.3.0" \
            "ruff>=0.4" "pytest>=8.0" "pytest-asyncio>=0.23"
          uv pip install --python .venv/bin/python -e "." --no-deps

      - name: Lint (ruff)
        run: .venv/bin/ruff check src/ --output-format=github

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          PYTHONPATH: ${{ github.workspace }}

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Используем target=deps: устанавливает только лёгкие зависимости
      # без torch (~2GB) — проверяет структуру, импорты, конфиги
      - name: Build Docker image (deps target, без torch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: deps
          push: false
          tags: smile-ai:ci-deps
          cache-from: type=gha
          cache-to: type=gha,mode=max
